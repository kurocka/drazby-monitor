<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dražby SK Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .stat-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .number { font-size: 2rem; font-weight: 700; }
        .filter-panel { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .auction-row { transition: background 0.15s; }
        .auction-row:hover { background: #f0f4ff; }
        .badge-planned { background: #3498db; }
        .badge-current { background: #e74c3c; }
        .price-tag { color: #27ae60; font-weight: 700; font-size: 1.1rem; }
        .sync-info { font-size: 0.85rem; color: #888; }
        .page-link.active { background: #1a1a2e; border-color: #1a1a2e; }
        a.auction-link { color: #2c3e50; text-decoration: none; }
        a.auction-link:hover { color: #3498db; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-hammer"></i> Dražby SK Monitor</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="bi bi-list-ul"></i> Dražby</a>
                <a class="nav-link" href="/filters"><i class="bi bi-funnel"></i> Filtre</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer class="text-center text-muted py-4 mt-5">
        <small>Dražby SK Monitor &mdash; Dáta: drazby.sk + Obchodný vestník (Slovensko.Digital DataHub)</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
